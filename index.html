<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abri Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        
        <div id="login-form" class="card shadow-lg p-4 text-center border-0" style="max-width: 400px; width: 100%;">
            <div class="icon-circle mx-auto mb-3">
                🚲
            </div>
            <h2 class="fw-bold mb-4">Connexion Abri</h2>
            <div class="mb-3">
                <input type="text" id="login-user" class="form-control form-control-lg" placeholder="Nom">
            </div>
            <div class="mb-4">
                <input type="password" id="login-pass" class="form-control form-control-lg" placeholder="Mot de passe">
            </div>
            <button id="btn-login" class="btn btn-success btn-lg w-100">Se connecter</button>
        </div>

        <div id="user-dashboard" class="hidden w-100" style="max-width: 600px;">
            <div class="card shadow border-0 p-4">
                <h3 class="fw-bold mb-4 text-dark">Bienvenue, <span id="user-name" class="text-success"></span></h3>
                <div class="card-solde p-4 mb-4 text-center">
                    <p class="text-uppercase tracking-wider small fw-bold mb-1">Capital Temps Restant</p>
                    <div class="display-4 fw-bold" id="user-time">--:--</div>
                </div>
                <button class="btn btn-outline-danger btn-logout w-100">Déconnexion</button>
            </div>
        </div>

        <div id="admin-dashboard" class="hidden w-100">
            <div class="card shadow border-0 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                    <h2 class="h4 fw-bold text-danger mb-0">Panel Administrateur</h2>
                    <span class="badge bg-dark p-2">Admin : <span id="admin-name"></span></span>
                </div>

                <div class="row g-4">
                    <div class="col-12 col-xl-6">
                        <h3 class="h6 fw-bold mb-3">Utilisateurs Enregistrés</h3>
                        <div class="table-responsive shadow-sm rounded">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Nom</th>
                                        <th>Prénom</th>
                                        <th>N° Badge</th>
                                    </tr>
                                </thead>
                                <tbody id="users-list" class="bg-white"></tbody> 
                            </table>
                        </div>
                    </div>

                    <div class="col-12 col-xl-6">
                        <h3 class="h6 fw-bold mb-3">État des Boxes</h3>
                        <div class="table-responsive shadow-sm rounded">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>N° Box</th>
                                        <th>État</th>
                                        <th>Occupant</th>
                                    </tr>
                                </thead>
                                <tbody id="boxes-list" class="bg-white"></tbody> 
                            </table>
                        </div>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top">
                    <button class="btn btn-danger btn-logout px-4">Déconnexion</button>
                </div>
            </div>
        </div>

    </div>

    <script src="js/auth.js"></script>
    <script src="/back/push-notifications.js"></script>
</body>
</html>
